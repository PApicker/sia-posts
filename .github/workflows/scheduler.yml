name: Post scheduled to Telegram

on:
  schedule:
    # Каждые 30 минут. Точность отправки ±15 мин от запланированного времени.
    - cron: '*/30 * * * *'
  workflow_dispatch:  # ручной запуск из вкладки Actions

permissions:
  contents: write

concurrency:
  group: scheduler
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Post due items
        env:
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python cron_post.py

      - name: Commit updated queue
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --quiet && git diff --staged --quiet && exit 0
          git commit -m "auto: posted due items"
          git push
